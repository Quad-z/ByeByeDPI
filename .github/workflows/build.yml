name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          xcodebuild -project ByeByeDPI.xcodeproj \
            -scheme ByeByeDPI \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ByeByeDPI.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package unsigned IPA
        run: |
          mkdir -p ipa/Payload
          cp -r "build/ByeByeDPI.xcarchive/Products/Applications/ByeByeDPI.app" ipa/Payload/
          cd ipa
          zip -r ByeByeDPI.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ByeByeDPI
          path: ipa/ByeByeDPI.ipa
